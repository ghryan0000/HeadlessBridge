name: HeadlessBridge
options:
  bundleIdPrefix: com.ryanchang
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: false

# 📌 使用 Citadel (純 Swift SSH 客戶端)
# Shout/NMSSH 在 SPM 下常有 C 函式庫連結問題，Citadel 是基於 SwiftNIO 的純 Swift 實作，最穩定
packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.9.2"

targets:
  HeadlessBridge:
    type: application
    platform: iOS
    sources:
      - HeadlessBridge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanchang.HeadlessBridge
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: HeadlessBridge/Info.plist
        CODE_SIGN_ENTITLEMENTS: HeadlessBridge/HeadlessBridge.entitlements
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # 📌 啟用 SSH 後取消下方 dependencies 註解
    dependencies:
      - package: Citadel
        product: Citadel
    entitlements:
      path: HeadlessBridge/HeadlessBridge.entitlements
      properties:
        # com.apple.developer.networking.wifi-info requires paid Apple Developer account
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.headlessbridge.keychain
