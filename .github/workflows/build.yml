name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Project
      run: xcodegen generate

    - name: Build
      run: |
        xcodebuild build \
          -project HeadlessBridge.xcodeproj \
          -scheme HeadlessBridge \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          -configuration Debug \
          -derivedDataPath build/DerivedData
